[pytest]
pythonpath = src
testpaths = tests
# Disable the hypothesis pytest plugin's auto-load: some locked-down hosts block
# its native DLL, which would otherwise fail plugin import. The @given tests
# still run wherever hypothesis imports cleanly (e.g. CI); where it can't, the
# property-test modules skip themselves.
addopts = -q -p no:hypothesispytest
